name: Build Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon

      - name: Print Debug Signing SHA1
        run: |
          echo "=== Debug Keystore SHA1 ==="
          keytool -list -v -keystore ~/.android/debug.keystore -alias androiddebugkey -storepass android -keypass android 2>/dev/null | grep "SHA1" || echo "SHA1 not found"
          echo "=== Package Name ==="
          echo "com.example.locationalarm"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LocationAlarm-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
